name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Cloudflare Pages serves from site root (not GitHub Pages subpath)
          SITE_URL: ${{ vars.SITE_URL || 'https://github-trend-daily.pages.dev' }}
          BASE_PATH: /
        run: pnpm build

      # Pre-install at workspace root; wrangler-action's `pnpm add` lacks `-w` and fails in monorepos
      - name: Install wrangler
        run: pnpm add -wD wrangler@3

      - name: Create Pages project (if missing)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages project create github-trend-daily --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy apps/web/dist --project-name=github-trend-daily --branch=${{ github.ref_name }} --commit-dirty=true
