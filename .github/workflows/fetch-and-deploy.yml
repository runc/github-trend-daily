name: Fetch trending and deploy

on:
  schedule:
    # 08:00 and 17:00 Beijing (UTC+8) — twice daily
    - cron: '0 0,9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-and-deploy
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Fetch trending + DeepWiki + LLM enrich
        env:
          TREND_SINCE: 'daily,weekly,monthly'
          TREND_LANGUAGES: 'TypeScript,JavaScript,Python,Go,Rust,Java'
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SUMMARY_LANG: ${{ vars.SUMMARY_LANG || '中文' }}
          DEEPWIKI_MCP_URL: ${{ secrets.DEEPWIKI_MCP_URL || 'https://mcp.deepwiki.com/sse' }}
          ENRICH_CONCURRENCY: '4'
          ENRICH_LIMIT_PER_SNAPSHOT: '25'
        run: pnpm run fetch

      - name: Commit snapshot data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data
          if git diff --cached --quiet; then
            echo "no new data"
          else
            git commit -m "chore(data): trending snapshot $(date -u +%F-%H%M)"
            git push
          fi

  deploy-cloudflare:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build (Astro + Pagefind)
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://github-trend-daily.pages.dev' }}
          BASE_PATH: /
        run: pnpm build

      - name: Install wrangler
        run: pnpm add -wD wrangler@3

      - name: Create Pages project (if missing)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages project create github-trend-daily --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy apps/web/dist --project-name=github-trend-daily --branch=${{ github.ref_name }} --commit-dirty=true
